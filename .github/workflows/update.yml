name: update-sub

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download subscriptions
        run: |
          rm -f output.yaml
          
          while read line
          do
            echo "Downloading: $line"
            curl -L --max-time 30 "$line" >> output.yaml || true
            echo "" >> output.yaml
          done < sources.txt

      - name: Show output size
        run: |
          ls -lh output.yaml
          wc -l output.yaml

      - name: Commit files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git pull --rebase
          
          git add output.yaml
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "update subscription"
          
          git push
