name: update-sub

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Это важно для корректного pull/rebase

      - name: Download subscriptions
        run: |
          if [ ! -f sources.txt ]; then
            echo "sources.txt not found"
            exit 1
          fi
          > output.yaml
          while IFS= read -r line || [ -n "$line" ]
          do
            [[ -z "$line" || "$line" == #* ]] && continue
            curl -L --max-time 30 "$line" >> output.yaml || true
            echo -e "\n" >> output.yaml
          done < sources.txt

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add output.yaml
          
          # Если изменений нет, выходим
          git diff --staged --quiet && exit 0

          git commit -m "update sub: $(date +'%Y-%m-%d %H:%M')"

          # КЛЮЧЕВОЕ ИСПРАВЛЕНИЕ:
          # Забираем изменения из облака, если они там появились
          git pull --rebase origin main

          # Теперь пушим
          git push origin main
