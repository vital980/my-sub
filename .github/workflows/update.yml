name: update-sub

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download subscriptions
        run: |
          rm -f output.yaml
          touch output.yaml

          while read line
          do
            echo "Downloading: $line"
            curl -L --silent "$line" >> output.yaml || true
            echo "" >> output.yaml
          done < sources.txt

      - name: Commit files
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"

          git add output.yaml

          git diff --cached --quiet && exit 0

          git stash
          git pull origin main --rebase
          git stash pop || true

          git commit -m "update"

          git push
