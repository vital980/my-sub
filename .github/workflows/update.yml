name: update-sub

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

# Переменная для принудительного использования Node.js 24 (решает проблему из логов)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Даем права на запись в репозиторий
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4 # v4 — самая стабильная на данный момент
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download subscriptions
        run: |
          # Создаем пустой файл или очищаем старый
          cat /dev/null > output.yaml

          # Проверяем существование sources.txt, чтобы билд не падал
          if [ ! -f sources.txt ]; then
            echo "Error: sources.txt not found!"
            exit 1
          fi

          while IFS= read -r line || [ -n "$line" ]
          do
            # Пропускаем пустые строки
            [ -z "$line" ] && continue
            
            echo "Downloading: $line"
            curl -L --max-time 30 "$line" >> output.yaml || echo "Failed to download $line"
            echo -e "\n" >> output.yaml
          done < sources.txt

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add output.yaml

          # Проверяем, есть ли изменения
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "update sub: $(date +'%Y-%m-%d %H:%M')"
          
          # Пытаемся запушить. Если не сработает — выведет понятную ошибку
          git push origin main || { echo "Push failed. Check account restrictions or permissions."; exit 1; }
