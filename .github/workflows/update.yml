name: update-sub

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Обязательно 0, чтобы Git видел всю историю для pull

      - name: Download subscriptions
        run: |
          if [ ! -f sources.txt ]; then
            echo "sources.txt not found"
            exit 1
          fi
          > output.yaml
          while IFS= read -r line || [ -n "$line" ]
          do
            [[ -z "$line" || "$line" == #* ]] && continue
            curl -L -f --max-time 30 "$line" >> output.yaml || echo "Failed: $line"
            echo -e "\n" >> output.yaml
          done < sources.txt

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add output.yaml

          # Проверяем, изменилось ли что-то, чтобы не делать пустых коммитов
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "update sub: $(date +'%Y-%m-%d %H:%M')"

          # РЕШЕНИЕ ВАШЕЙ ОШИБКИ: 
          # Забираем изменения из GitHub и ставим наш коммит сверху
          git pull --rebase origin main
          
          # Теперь пушим без конфликтов
          git push origin main
