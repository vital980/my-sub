name: update-sub

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download subconverter
        run: |
          git clone https://github.com/tindy2013/subconverter.git
          cd subconverter

      - name: Build subscription
        run: |
          URLS=$(paste -sd '|' sources.txt)

          ENCODED_URLS=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$URLS'''))")

          curl "http://sub.xeton.dev/sub?target=clash&url=$ENCODED_URLS&insert=false&emoji=true&list=true&sort=true" -o output.yaml

      - name: Commit output
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add output.yaml

          git commit -m "update subscription" || echo "No changes"

          git push
